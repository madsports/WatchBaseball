<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchBaseball</title>
    <link rel="icon" type="image/png" href="https://pngimg.com/d/baseball_PNG19004.png">

    <script src="/scram/scramjet.all.js"></script>
    <script src="/baremux/index.js"></script>
    <script src="/epoxy/index.js"></script>
    <script src="/register-sw.js"></script>

    <style>
        :root {
            --bg: #0a0a0a;
            --bg2: #111111;
            --panel: rgba(255,255,255,0.07);
            --panel-2: rgba(255,255,255,0.09);
            --border: rgba(255,255,255,0.16);
            --text: #f8f8f8;
            --muted: #a9a9a9;
            --accent: #ffffff;
            --danger: #ef4444;
            --shadow: 0 15px 50px rgba(0,0,0,.45);
            --radius: 24px;
        }

        [data-theme="light"] {
            --bg: #f6f7fb;
            --bg2: #ffffff;
            --panel: rgba(255,255,255,0.92);
            --panel-2: rgba(255,255,255,0.98);
            --border: rgba(0,0,0,0.1);
            --text: #111111;
            --muted: #555555;
            --accent: #000000;
            --shadow: 0 15px 40px rgba(0,0,0,.08);
        }

        [data-theme="baseball"] {
            --bg: #111111;
            --bg2: #171717;
            --panel: rgba(255,255,255,0.06);
            --panel-2: rgba(255,255,255,0.1);
            --border: rgba(239,68,68,.35);
            --text: #f8f8f8;
            --muted: #c5c5c5;
            --accent: #ef4444;
        }

        [data-theme="ocean"] {
            --bg: #0a1625;
            --bg2: #102136;
            --panel: rgba(103,232,249,0.08);
            --panel-2: rgba(103,232,249,0.12);
            --border: rgba(103,232,249,0.24);
            --text: #e0f2fe;
            --muted: #9fb6cb;
            --accent: #67e8f9;
        }

        [data-theme="forest"] {
            --bg: #0c1a0f;
            --bg2: #122317;
            --panel: rgba(134,239,172,0.08);
            --panel-2: rgba(134,239,172,0.12);
            --border: rgba(134,239,172,0.28);
            --text: #f0fdf4;
            --muted: #93c5a5;
            --accent: #4ade80;
        }

        [data-theme="midnight"] {
            --bg: #0a0a1f;
            --bg2: #141433;
            --panel: rgba(165,180,252,0.08);
            --panel-2: rgba(165,180,252,0.12);
            --border: rgba(165,180,252,0.24);
            --text: #e0e7ff;
            --muted: #a5b4fc;
            --accent: #818cf8;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, system-ui, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top, rgba(255,255,255,.05), transparent 30%),
                var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background .4s ease, color .3s ease;
        }

        .main-ui-container {
            width: 92%;
            max-width: 920px;
            margin: 36px auto 24px;
            padding: 38px 32px;
            background: var(--panel);
            backdrop-filter: blur(22px);
            border: 1px solid var(--border);
            border-radius: 30px;
            box-shadow: var(--shadow);
            text-align: center;
            animation: pageIn .45s ease;
        }

        @keyframes pageIn {
            from { opacity: 0; transform: translateY(16px) scale(.985); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        h1 {
            font-size: 3rem;
            margin: 0 0 6px;
            letter-spacing: -1px;
        }

        .sub-header {
            color: var(--muted);
            font-size: 1.15rem;
            margin-bottom: 6px;
        }

        .made-by {
            color: var(--muted);
            font-size: .92rem;
            margin-bottom: 28px;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 24px;
            margin-bottom: 20px;
        }

        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            font-weight: 600;
            transition: color .2s ease, transform .2s ease;
        }

        .nav-links a:hover {
            color: var(--accent);
            transform: translateY(-1px);
        }

        #sj-form {
            display: flex;
            gap: 8px;
            background: var(--panel-2);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 8px;
            max-width: 700px;
            margin: 0 auto 22px;
        }

        #sj-address {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            padding: 14px 16px;
            font-size: 1rem;
        }

        .primary-btn,
        .control-btn,
        .bookmark-btn,
        .modal-btn,
        .new-tab-btn,
        .quick-btn,
        .sport-btn {
            border: none;
            cursor: pointer;
            transition: .22s ease;
        }

        .primary-btn {
            background: var(--accent);
            color: var(--bg);
            padding: 14px 22px;
            border-radius: 16px;
            font-weight: 700;
        }

        .primary-btn:hover {
            transform: translateY(-2px);
            opacity: .95;
        }

        .quick-links-grid,
        .sport-tabs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .quick-btn,
        .sport-btn,
        .bookmark-chip {
            background: var(--panel-2);
            color: var(--accent);
            border: 1px solid var(--border);
            padding: 10px 16px;
            border-radius: 999px;
            font-size: .92rem;
        }

        .quick-btn:hover,
        .sport-btn:hover,
        .bookmark-chip:hover {
            transform: translateY(-2px) scale(1.02);
            background: rgba(255,255,255,.16);
        }

        .quick-btn.pop {
            animation: quickPop .28s ease;
        }

        @keyframes quickPop {
            0% { transform: scale(1); }
            50% { transform: scale(.95); }
            100% { transform: scale(1); }
        }

        .sport-btn.active {
            background: var(--accent);
            color: var(--bg);
            font-weight: 700;
        }

        .sports-section { margin-top: 6px; }

        .sports-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            gap: 14px;
        }

        .timer-pill {
            background: var(--panel-2);
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 6px 12px;
            border-radius: 999px;
            font-size: .86rem;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 18px;
            transition: opacity .35s ease;
        }

        .news-grid.loading { opacity: .4; }

        .news-card {
            background: var(--panel-2);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 18px;
            text-decoration: none;
            color: var(--text);
            text-align: left;
            transition: .24s ease;
            animation: cardIn .35s ease backwards;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .news-card:hover {
            transform: translateY(-4px);
            background: rgba(255,255,255,.14);
        }

        .news-card .source {
            color: var(--muted);
            font-size: .8rem;
            margin-bottom: 8px;
        }

        /* Settings Modal */
        #settings-modal,
        #browser-settings-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.45);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10020;
            padding: 18px;
        }

        .modal-panel {
            width: 100%;
            max-width: 560px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 20px;
            animation: modalIn .25s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: translateY(10px) scale(.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .modal-title {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .close-modal {
            background: transparent;
            color: var(--text);
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
        }

        .setting-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .setting-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--muted);
            font-size: .95rem;
            font-weight: 600;
        }

        .theme-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .theme-btn,
        select,
        .modal-btn,
        .settings-input {
            background: var(--panel-2);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 14px;
            font: inherit;
        }

        .theme-btn.active {
            background: var(--accent);
            color: var(--bg);
            font-weight: 700;
        }

        .modal-btn {
            width: 100%;
        }

        .row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .row > * { flex: 1; min-width: 150px; }

        /* Browser */
        #proxy-overlay {
            position: fixed;
            inset: 0;
            background: #070707;
            z-index: 9999;
            display: none;
            flex-direction: column;
            opacity: 0;
            transition: opacity .28s ease, transform .28s ease;
        }

        #proxy-overlay.show {
            display: flex;
            opacity: 1;
        }

        #proxy-overlay.closing {
            opacity: 0;
            transform: scale(.992);
        }

        .proxy-top {
            background: linear-gradient(to bottom, #121212, #0d0d0d);
            border-bottom: 1px solid #242424;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px 12px;
        }

        .proxy-toolbar,
        .bookmark-bar {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .proxy-toolbar {
            min-height: 48px;
        }

        .control-btn,
        .new-tab-btn,
        .bookmark-btn {
            background: #1d1d1d;
            color: #ececec;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid #303030;
            min-width: 42px;
        }

        .control-btn:hover,
        .new-tab-btn:hover,
        .bookmark-btn:hover {
            background: #2a2a2a;
            transform: translateY(-1px);
        }

        .exit-btn {
            background: #2a1313;
            color: #ffb3b3;
            border: 1px solid #5a2323;
        }

        .exit-btn:hover {
            background: #3a1717;
        }

        #proxy-nav-input {
            flex: 1;
            background: #171717;
            color: white;
            border: 1px solid #343434;
            border-radius: 999px;
            padding: 12px 16px;
            outline: none;
        }

        #tab-bar {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 0 2px;
            scrollbar-width: thin;
        }

        .tab {
            min-width: 160px;
            max-width: 210px;
            background: #161616;
            border: 1px solid #2d2d2d;
            border-radius: 14px 14px 0 0;
            color: #c8c8c8;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: .2s ease;
            animation: tabIn .22s ease;
        }

        .tab:hover { background: #1e1e1e; }

        .tab.active {
            background: #252525;
            color: white;
            border-top: 2px solid #ffffff;
        }

        @keyframes tabIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tab-title {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }

        .close-tab {
            color: #ff8b8b;
            font-weight: 700;
            padding: 0 4px;
        }

        .frame-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            opacity: 0;
            transform: scale(.998);
            transition: opacity .18s ease, transform .18s ease;
        }

        iframe.active {
            display: block;
            opacity: 1;
            transform: scale(1);
        }

        .new-tab-page {
            position: absolute;
            inset: 0;
            display: none;
            place-items: center;
            background:
                radial-gradient(circle at top, rgba(255,255,255,.06), transparent 26%),
                #0a0a0a;
            color: white;
            padding: 30px;
        }

        .new-tab-page.active {
            display: grid;
        }

        .new-tab-inner {
            width: 100%;
            max-width: 760px;
            text-align: center;
            animation: pageIn .25s ease;
        }

        .new-tab-inner h2 {
            font-size: 2.3rem;
            margin-bottom: 10px;
        }

        .new-tab-inner p {
            color: #aaa;
            margin-bottom: 18px;
        }

        .new-tab-search {
            display: flex;
            gap: 8px;
            background: #141414;
            border: 1px solid #2a2a2a;
            padding: 8px;
            border-radius: 22px;
        }

        .new-tab-search input {
            flex: 1;
            background: transparent;
            color: white;
            border: none;
            outline: none;
            padding: 14px 16px;
            font-size: 1rem;
        }

        .bookmark-bar {
            overflow-x: auto;
            padding-bottom: 2px;
        }

        .bookmark-chip {
            color: white;
            background: #151515;
            border: 1px solid #2b2b2b;
            cursor: pointer;
            white-space: nowrap;
        }

        .bookmark-chip .x {
            margin-left: 8px;
            color: #ff8b8b;
            font-weight: bold;
        }

        @media (max-width: 700px) {
            h1 { font-size: 2.35rem; }
            .main-ui-container { padding: 26px 18px; margin: 20px 12px; }
            .sports-header { flex-direction: column; align-items: flex-start; }
            .proxy-toolbar { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <div class="main-ui-container" id="main-menu">
        <div class="nav-links">
            <a href="/games.html">Games</a>
            <a href="/proxies.html">Proxies</a>
            <a href="/chat.html">Live Chat</a>
            <a href="#" id="settings-btn">Settings</a>
            <a href="/credits.html">Credits</a>
        </div>

        <h1>WatchBaseball</h1>
        <p class="sub-header">Keep Sports News, Watch Baseball & Search Anything</p>

        <form id="sj-form">

            <button type="submit" class="primary-btn">Go</button>

    <div class="main-ui-container sports-section" id="news-section">

    <!-- Main Settings -->
    <div id="settings-modal">

            <div class="setting-group">
                <label>Theme</label>

                    <button class="theme-btn" data-theme="dark">Dark</button>

                    <button class="theme-btn" data-theme="ocean">Ocean</button>

    <!-- Browser Settings -->
    <div id="browser-settings-modal">
        <div class="modal-panel">
            <div class="modal-header">
                <div class="modal-title">Browser Settings</div>
                <button class="close-modal" id="close-browser-modal">×</button>
            </div>

            <div class="setting-group">
                <label>Add Bookmark</label>
                <div class="row">
                    <input id="bookmark-name" class="settings-input" placeholder="Bookmark name">
                    <input id="bookmark-url" class="settings-input" placeholder="https://example.com">
                </div>
            </div>

            <div class="setting-group">
                <button id="add-bookmark-btn" class="modal-btn">Save Bookmark</button>

    <!-- Browser -->
    <div id="proxy-overlay">
        <div class="proxy-top">
            <div class="proxy-toolbar">
                <button class="control-btn exit-btn" id="exit-proxy-btn">Exit</button>
                <button class="control-btn" id="back-btn">←</button>
                <button class="control-btn" id="forward-btn">→</button>
                <button class="control-btn" id="refresh-btn">⟳</button>
                <input id="proxy-nav-input" type="text" placeholder="Enter URL or search...">
                <button class="bookmark-btn" id="save-current-bookmark">★</button>
                <button class="control-btn" id="browser-settings-btn">⚙</button>
                <button class="new-tab-btn" id="new-tab-btn">+ New Tab</button>
            </div>

            <div class="bookmark-bar" id="bookmark-bar"></div>
            <div id="tab-bar"></div>
        </div>

        <div class="frame-container" id="frame-host"></div>
    </div>

    <script>
        "use strict";

        const sports = {
            MLB: { label: "MLB", rss: "https://www.mlb.com/feeds/news/rss.xml" },
            NFL: { label: "NFL", rss: "https://www.cbssports.com/rss/headlines/nfl" },
            NBA: { label: "NBA", rss: "https://www.cbssports.com/rss/headlines/nba" },
            NHL: { label: "NHL", rss: "https://www.cbssports.com/rss/headlines/nhl" },
            FC:  { label: "FC",  rss: "https://www.cbssports.com/rss/headlines/soccer" }
        };

        let currentSport = "MLB";
        let refreshSecs = 60;
        let tabs = [];
        let activeTabId = null;
        let bookmarks = [];
        let searchEngine = "google";
        let proxyReady = false;
        let bareConnection = null;

        const quickLinks = [
            { name: "buffstreams", url: "https://buffstreams.app/" },
            { name: "mlbwebcast", url: "https://mlbwebcast.com/" },
            { name: "streameast", url: "https://the.streameast.app/" },
            { name: "sharkstreams", url: "https://sharkstreams.net/" },
            { name: "sportsurge", url: "https://sportsurge.net/" }
        ];

        function safeGet(key, fallback) {
            try {
                const v = localStorage.getItem(key);
                return v !== null ? v : fallback;
            } catch {
                return fallback;
            }
        }

        function safeSet(key, value) {
            try { localStorage.setItem(key, value); } catch {}
        }

        function safeJSONGet(key, fallback) {
            try {
                const raw = safeGet(key, null);
                return raw ? JSON.parse(raw) : fallback;
            } catch {
                return fallback;
            }
        }

        function safeJSONSet(key, value) {
            safeSet(key, JSON.stringify(value));
        }

        function getSearchTemplate() {
            if (searchEngine === "duckduckgo") return "https://duckduckgo.com/?q=%s";
            if (searchEngine === "bing") return "https://www.bing.com/search?q=%s";
            return "https://www.google.com/search?q=%s";
        }

        function search(input, template = getSearchTemplate()) {
            try { return new URL(input).toString(); } catch {}
            try {
                const u = new URL(`http://${input}`);
                if (u.hostname.includes(".")) return u.toString();
            } catch {}
            return template.replace("%s", encodeURIComponent(input));
        }

        function setTheme(theme) {
            document.documentElement.setAttribute("data-theme", theme);
            safeSet("watchbaseball_theme", theme);
            document.querySelectorAll(".theme-btn").forEach(btn => {
                btn.classList.toggle("active", btn.dataset.theme === theme);
            });
        }

        function loadTheme() {
            const theme = safeGet("watchbaseball_theme", "dark");
            setTheme(theme);
        }

        function renderQuickLinks() {
            const container = document.getElementById("quick-links-grid");
            container.innerHTML = "";
            quickLinks.forEach(link => {
                const btn = document.createElement("button");
                btn.className = "quick-btn";
                btn.textContent = link.name;
                btn.onclick = () => {
                    btn.classList.remove("pop");
                    void btn.offsetWidth;
                    btn.classList.add("pop");
                    setTimeout(() => openInProxy(link.url), 120);
                };
                container.appendChild(btn);
            });
        }

        function getPreferredSport() {
            const saved = safeGet("preferredSport", "MLB");
            return sports[saved] ? saved : "MLB";
        }

        function savePreferredSport(sportKey) {
            if (!sports[sportKey]) return;
            currentSport = sportKey;
            safeSet("preferredSport", sportKey);
            renderSportButtons();
            refreshNewsWithAnimation();
        }

        function renderSportButtons() {
            const container = document.getElementById("sport-tabs");
            container.innerHTML = "";
            Object.keys(sports).forEach(key => {
                const btn = document.createElement("button");
                btn.className = `sport-btn ${key === currentSport ? "active" : ""}`;
                btn.textContent = sports[key].label;
                btn.onclick = () => savePreferredSport(key);
                container.appendChild(btn);
            });
        }

        async function refreshNewsWithAnimation() {
            const container = document.getElementById("sports-news");
            container.classList.add("loading");
            await new Promise(r => setTimeout(r, 160));

            try {
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(sports[currentSport].rss)}`);
                const data = await res.json();

                container.innerHTML = "";

                if (!data.items || !data.items.length) {
                    container.innerHTML = `<p style="grid-column:1/-1; color:var(--muted);">No news available right now.</p>`;
                    container.classList.remove("loading");
                    return;
                }

                data.items.slice(0, 8).forEach((item, i) => {
                    const card = document.createElement("a");
                    card.className = "news-card";
                    card.style.animationDelay = `${i * 45}ms`;
                    card.href = item.link;
                    card.target = "_blank";
                    card.rel = "noopener noreferrer";
                    card.innerHTML = `
                        <div class="source">${sports[currentSport].label} • LATEST</div>
                        <div style="font-weight:700; line-height:1.4;">${item.title}</div>
                    `;
                    container.appendChild(card);
                });
            } catch {
                container.innerHTML = `<p style="grid-column:1/-1; color:#ff8d8d;">Couldn't load news. Please check connection.</p>`;
            }

            container.classList.remove("loading");
        }

        function updateTimer() {
            refreshSecs--;
            if (refreshSecs <= 0) {
                refreshSecs = 60;
                refreshNewsWithAnimation();
            }
            document.getElementById("refresh-timer").textContent = refreshSecs;
        }

        async function ensureProxyReady() {
            if (proxyReady) return true;
            try {
                bareConnection = new BareMux.BareMuxConnection("/baremux/worker.js");
                const wispUrl = (location.protocol === "https:" ? "wss" : "ws") + "://" + location.host + "/wisp/";
                await bareConnection.setTransport("/epoxy/index.mjs", [{ wisp: wispUrl }]);
                proxyReady = true;
                return true;
            } catch {
                alert("Proxy failed to start. Refresh and try again.");
                return false;
            }
        }

        function showProxy() {
            const overlay = document.getElementById("proxy-overlay");
            document.getElementById("main-menu").style.display = "none";
            document.getElementById("news-section").style.display = "none";
            overlay.style.display = "flex";
            requestAnimationFrame(() => overlay.classList.add("show"));
        }

        function hideProxyToHomepage() {
            const overlay = document.getElementById("proxy-overlay");
            overlay.classList.add("closing");
            setTimeout(() => {
                overlay.classList.remove("show", "closing");
                overlay.style.display = "none";
                document.getElementById("main-menu").style.display = "";
                document.getElementById("news-section").style.display = "";
            }, 220);
        }

        async function openInProxy(url) {
            const ok = await ensureProxyReady();
            if (!ok) return;
            showProxy();

            if (!tabs.length) {
                createTab(url);
            } else {
                navigateActiveTab(url);
            }
        }

        function getTabTitle(tab) {
            if (tab.isNewTab) return "New Tab";
            try { return new URL(tab.url).hostname; } catch {}
            return "Tab";
        }

        function saveTabsState() {
            const simpleTabs = tabs.map(t => ({
                id: t.id,
                url: t.url || "",
                isNewTab: !!t.isNewTab
            }));
            safeJSONSet("watchbaseball_saved_tabs", simpleTabs);
            safeSet("watchbaseball_active_tab", activeTabId || "");
        }

        function loadTabsState() {
            return safeJSONGet("watchbaseball_saved_tabs", []);
        }

        function renderBookmarks() {
            const bar = document.getElementById("bookmark-bar");
            bar.innerHTML = "";
            bookmarks.forEach((bm, index) => {
                const chip = document.createElement("button");
                chip.className = "bookmark-chip";
                chip.innerHTML = `<span>${bm.name}</span><span class="x">×</span>`;
                chip.onclick = (e) => {
                    if (e.target.classList.contains("x")) {
                        bookmarks.splice(index, 1);
                        safeJSONSet("watchbaseball_bookmarks", bookmarks);
                        renderBookmarks();
                        return;
                    }
                    openInProxy(bm.url);
                };
                bar.appendChild(chip);
            });
        }

        function addBookmark(name, url) {
            if (!name || !url) return;
            bookmarks.push({ name, url });
            safeJSONSet("watchbaseball_bookmarks", bookmarks);
            renderBookmarks();
        }

        function switchTab(id) {
            activeTabId = id;

            document.querySelectorAll("#frame-host iframe").forEach(f => f.classList.remove("active"));
            document.querySelectorAll(".new-tab-page").forEach(p => p.classList.remove("active"));

            const tab = tabs.find(t => t.id === id);
            if (!tab) return;

            if (tab.isNewTab) {
                const page = document.getElementById(id);
                if (page) page.classList.add("active");
                document.getElementById("proxy-nav-input").value = "";
            } else {
                const frame = document.getElementById(id);
                if (frame) frame.classList.add("active");
                document.getElementById("proxy-nav-input").value = tab.url || "";
            }

            renderTabs();
            saveTabsState();
        }

        function renderTabs() {
            const bar = document.getElementById("tab-bar");
            bar.innerHTML = "";

            tabs.forEach(tab => {
                const el = document.createElement("div");
                el.className = `tab ${tab.id === activeTabId ? "active" : ""}`;
                el.innerHTML = `
                    <span class="tab-title">${getTabTitle(tab)}</span>
                    <span class="close-tab">×</span>
                `;
                el.onclick = () => switchTab(tab.id);
                el.querySelector(".close-tab").onclick = (e) => closeTab(tab.id, e);
                bar.appendChild(el);
            });
        }

        function createNewTabPage() {
            const id = "tab-" + Date.now();
            const page = document.createElement("div");
            page.className = "new-tab-page";
            page.id = id;
            page.innerHTML = `
                <div class="new-tab-inner">
                    <h2>New Tab</h2>
                    <p>Search the web or enter a URL</p>
                    <form class="new-tab-search">
                        <input type="text" placeholder="Search or enter address" autocomplete="off">
                        <button class="primary-btn" type="submit">Go</button>
                    </form>
                </div>
            `;

            page.querySelector("form").addEventListener("submit", (e) => {
                e.preventDefault();
                const input = page.querySelector("input").value.trim();
                if (!input) return;
                const url = search(input);
                convertNewTabToPage(id, url);
            });

            document.getElementById("frame-host").appendChild(page);
            tabs.push({ id, url: "", isNewTab: true });
            renderTabs();
            switchTab(id);
            saveTabsState();
        }

        function convertNewTabToPage(id, url) {
            const idx = tabs.findIndex(t => t.id === id);
            if (idx === -1) return;

            const oldPage = document.getElementById(id);
            if (oldPage) oldPage.remove();

            tabs.splice(idx, 1);
            createTab(url, id);
        }

        function createTab(url, forcedId = null) {
            const id = forcedId || ("tab-" + Date.now());

            const loaded = $scramjetLoadController?.();
            const ScramjetController = loaded?.ScramjetController;
            if (!ScramjetController) {
                alert("Scramjet not loaded. Refresh the page.");
                return;
            }

            const scramjet = new ScramjetController({
                files: {
                    wasm: "/scram/scramjet.wasm.wasm",
                    all: "/scram/scramjet.all.js"
                }
            });

            scramjet.init();
            const frameObj = scramjet.createFrame();
            const frame = frameObj.frame;
            frame.id = id;

            document.getElementById("frame-host").appendChild(frame);

            const tab = { id, url, frameObj, isNewTab: false };
            tabs.push(tab);
            renderTabs();
            switchTab(id);
            frameObj.go(url);
            saveTabsState();
        }

        function navigateActiveTab(url) {
            const tab = tabs.find(t => t.id === activeTabId);
            if (!tab) return createTab(url);

            if (tab.isNewTab) {
                convertNewTabToPage(tab.id, url);
                return;
            }

            tab.url = url;
            const frame = document.getElementById(tab.id);
            if (frame && tab.frameObj) {
                tab.frameObj.go(url);
            }
            document.getElementById("proxy-nav-input").value = url;
            renderTabs();
            saveTabsState();
        }

        function closeTab(id, e) {
            e.stopPropagation();

            const idx = tabs.findIndex(t => t.id === id);
            if (idx === -1) return;

            const el = document.getElementById(id);
            if (el) {
                el.style.transition = "opacity .16s ease, transform .16s ease";
                el.style.opacity = "0";
                el.style.transform = "scale(.995)";
                setTimeout(() => el.remove(), 160);
            }

            tabs.splice(idx, 1);

            if (!tabs.length) {
                activeTabId = null;
                saveTabsState();
                hideProxyToHomepage();
                return;
            }

            const next = tabs[Math.max(0, idx - 1)] || tabs[0];
            activeTabId = next.id;
            renderTabs();
            switchTab(next.id);
            saveTabsState();
        }

        function refreshActiveTab() {
            const tab = tabs.find(t => t.id === activeTabId);
            if (!tab || tab.isNewTab || !tab.url) return;
            navigateActiveTab(tab.url);
        }

        function historyBack() {
            alert("Back navigation may be limited depending on the page.");
        }

        function historyForward() {
            alert("Forward navigation may be limited depending on the page.");
        }

        function openSettings() {
            document.getElementById("settings-modal").style.display = "flex";
        }

        function closeSettings() {
            document.getElementById("settings-modal").style.display = "none";
        }

        function openBrowserSettings() {
            document.getElementById("browser-settings-modal").style.display = "flex";
        }

        function closeBrowserSettings() {
            document.getElementById("browser-settings-modal").style.display = "none";
        }

        function restoreSavedTabsPromptless() {
            const saved = loadTabsState();
            if (!saved.length) return;

            showProxy();

            saved.forEach((t) => {
                if (t.isNewTab) createNewTabPage();
                else if (t.url) createTab(t.url);
            });

            const savedActive = safeGet("watchbaseball_active_tab", "");
            if (savedActive && tabs.some(t => t.id === savedActive)) {
                switchTab(savedActive);
            } else if (tabs[0]) {
                switchTab(tabs[0].id);
            }
        }

        window.addEventListener("load", () => {
            currentSport = getPreferredSport();
            bookmarks = safeJSONGet("watchbaseball_bookmarks", []);
            searchEngine = safeGet("watchbaseball_search_engine", "google");

            loadTheme();
            renderQuickLinks();
            renderSportButtons();
            refreshNewsWithAnimation();
            renderBookmarks();

            const searchSelect = document.getElementById("search-engine-select");
            searchSelect.value = searchEngine;

            setInterval(updateTimer, 1000);

            document.getElementById("sj-form").addEventListener("submit", (e) => {
                e.preventDefault();
                const input = document.getElementById("sj-address").value.trim();
                if (!input) return;
                openInProxy(search(input));
            });

            document.getElementById("settings-btn").addEventListener("click", (e) => {
                e.preventDefault();
                openSettings();
            });

            document.getElementById("close-modal").addEventListener("click", closeSettings);
            document.getElementById("close-browser-modal").addEventListener("click", closeBrowserSettings);

            document.querySelectorAll(".theme-btn").forEach(btn => {
                btn.addEventListener("click", () => setTheme(btn.dataset.theme));
            });

            searchSelect.addEventListener("change", () => {
                searchEngine = searchSelect.value;
                safeSet("watchbaseball_search_engine", searchEngine);
            });

            document.getElementById("clear-saved-tabs").addEventListener("click", () => {
                safeJSONSet("watchbaseball_saved_tabs", []);
                safeSet("watchbaseball_active_tab", "");
                alert("Saved tabs cleared.");
            });

            document.getElementById("exit-proxy-btn").addEventListener("click", hideProxyToHomepage);
            document.getElementById("back-btn").addEventListener("click", historyBack);
            document.getElementById("forward-btn").addEventListener("click", historyForward);
            document.getElementById("refresh-btn").addEventListener("click", refreshActiveTab);
            document.getElementById("new-tab-btn").addEventListener("click", createNewTabPage);
            document.getElementById("browser-settings-btn").addEventListener("click", openBrowserSettings);

            document.getElementById("proxy-nav-input").addEventListener("keydown", (e) => {
                if (e.key === "Enter") {
                    const val = e.target.value.trim();
                    if (!val) return;
                    navigateActiveTab(search(val));
                }
            });

            document.getElementById("save-current-bookmark").addEventListener("click", () => {
                const tab = tabs.find(t => t.id === activeTabId);
                if (!tab || tab.isNewTab || !tab.url) return;
                const name = prompt("Bookmark name:", getTabTitle(tab));
                if (!name) return;
                addBookmark(name, tab.url);
            });

            document.getElementById("add-bookmark-btn").addEventListener("click", () => {
                const name = document.getElementById("bookmark-name").value.trim();
                const urlInput = document.getElementById("bookmark-url").value.trim();
                if (!name || !urlInput) return;
                addBookmark(name, search(urlInput));
                document.getElementById("bookmark-name").value = "";
                document.getElementById("bookmark-url").value = "";
                closeBrowserSettings();
            });

            document.getElementById("clear-bookmarks-btn").addEventListener("click", () => {
                bookmarks = [];
                safeJSONSet("watchbaseball_bookmarks", bookmarks);
                renderBookmarks();
            });

            document.getElementById("settings-modal").addEventListener("click", (e) => {
                if (e.target.id === "settings-modal") closeSettings();
            });

            document.getElementById("browser-settings-modal").addEventListener("click", (e) => {
                if (e.target.id === "browser-settings-modal") closeBrowserSettings();
            });

            const savedTabs = loadTabsState();
            if (savedTabs.length) {
                restoreSavedTabsPromptless();
            }
        });
    </script>
</body>
</html>
