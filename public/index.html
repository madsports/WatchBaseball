<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>My Drive - Google Drive</title>
    <link rel="icon" type="image/x-icon" href="https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png">

    <script src="/scram/scramjet.all.js"></script>
    <script src="/baremux/index.js"></script>
    <script src="/epoxy/index.js"></script>
    <script src="/register-sw.js"></script>
    
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0; padding: 0;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        .main-ui-container {
            width: 90%; max-width: 800px;
            margin: 40px auto 20px auto;
            padding: 30px;
            background: var(--glass);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            text-align: center;
        }

        .site-logo { width: 60px; height: 60px; margin-bottom: 10px; }
        h1 { font-size: 2.5rem; margin: 0; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sub-header { color: var(--text-dim); margin-bottom: 25px; font-size: 1.1rem; }

        /* Search Form */
        #sj-form {
            display: flex; background: rgba(0, 0, 0, 0.2); padding: 8px; border-radius: 18px;
            border: 1px solid var(--glass-border); max-width: 600px; margin: 0 auto;
        }
        #sj-address { flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; font-size: 16px; }
        .primary-btn { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 14px; cursor: pointer; font-weight: bold; }

        /* TAB SYSTEM */
        #tab-bar {
            display: none; background: #0a0a0c; width: 100%; padding: 8px 10px 0 10px;
            gap: 4px; border-bottom: 1px solid #222; overflow-x: auto; align-items: flex-end;
            box-sizing: border-box;
        }
        .tab {
            background: #1a1a1c; color: #888; padding: 10px 15px; border-radius: 10px 10px 0 0;
            cursor: pointer; display: flex; align-items: center; gap: 8px; min-width: 140px;
            max-width: 200px; border: 1px solid #222; border-bottom: none; font-size: 12px;
            transition: 0.2s; position: relative;
        }
        .tab.active { background: #2d2d30; color: white; border-top: 2px solid var(--primary); }
        .tab img { width: 14px; height: 14px; }
        .close-tab { margin-left: auto; font-size: 16px; opacity: 0.5; }
        .close-tab:hover { opacity: 1; color: #ff5f57; }
        .new-tab-btn { background: var(--primary); color: white; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; margin: 0 10px 5px 10px; font-weight: bold; flex-shrink: 0; }

        /* Proxy Overlay */
        #proxy-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: none; flex-direction: column;
        }
        .proxy-nav { background: #1a1a1a; padding: 8px 15px; display: flex; gap: 12px; align-items: center; }
        .exit-btn { background: #333; color: #eee; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        #proxy-nav-input { flex: 1; background: #000; color: #818cf8; border: 1px solid #333; padding: 8px 12px; border-radius: 20px; outline: none; font-family: monospace; font-size: 13px; }
        
        .frame-container { flex: 1; position: relative; background: white; }
        iframe.proxy-frame { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; display: none; }
        iframe.proxy-frame.active { display: block; }

        /* Sports Scores Section */
        .sports-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .timer-pill { background: rgba(99, 102, 241, 0.1); color: #818cf8; padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; }
        #scores-frame { width: 100%; height: 500px; border-radius: 18px; border: 1px solid var(--glass-border); background: #fff; }
    </style>
</head>

<body>

    <div class="main-ui-container" id="main-menu">
        <img src="https://pngimg.com/d/baseball_PNG19004.png" class="site-logo" alt="logo">
        <h1>WatchBaseball</h1>
        <p class="sub-header">Search Anything You Want</p>

        <form id="sj-form">
            <input id="sj-search-engine" value="https://www.google.com/search?q=%s" type="hidden" />
            <input id="sj-address" type="text" placeholder="URL or Search..." autocomplete="off" />
            <button type="submit" class="primary-btn" id="sj-btn">Go</button>
        </form>
    </div>

    <div class="main-ui-container" id="sports-container" style="margin-top: 0px; padding: 20px;">
        <div class="sports-header">
            <h3 style="margin:0; font-size: 1.1rem;">Sports News & Live Scores</h3>
            <div class="timer-pill">Live Updates (ESPN)</div>
        </div>
        <iframe id="scores-frame" src="https://www.espn.com/core/scoreboard?xhr=1&render=false"></iframe>
    </div>

    <div id="proxy-overlay">
        <div id="tab-bar">
            <button class="new-tab-btn" onclick="openNewTabPrompt()">+</button>
        </div>
        <div class="proxy-nav">
            <button class="exit-btn" onclick="exitProxy()">Close All</button>
            <input id="proxy-nav-input" type="text" readonly />
        </div>
        <div class="frame-container" id="frame-host"></div>
    </div>

    <script>
        "use strict";

        let tabs = [];
        let activeTabId = null;
        let scramjetInstance = null;
        const connection = new BareMux.BareMuxConnection("/baremux/worker.js");

        function getController() {
            if (!scramjetInstance) {
                const { ScramjetController } = $scramjetLoadController();
                scramjetInstance = new ScramjetController({
                    files: { wasm: '/scram/scramjet.wasm.wasm', all: '/scram/scramjet.all.js', sync: '/scram/scramjet.sync.js' },
                });
                scramjetInstance.init();
            }
            return scramjetInstance;
        }

        async function createTab(url) {
            const controller = getController();
            const id = 'tab-' + Date.now();
            
            if ('serviceWorker' in navigator) {
                await navigator.serviceWorker.register('/scram/sw.js', { scope: '/scram/service/' });
            }

            const frameObj = controller.createFrame();
            const frame = frameObj.frame;
            frame.id = id;
            frame.classList.add('proxy-frame');
            document.getElementById('frame-host').appendChild(frame);
            
            const tabData = { id, url, frameObj };
            tabs.push(tabData);
            
            renderTabs();
            switchTab(id);
            frameObj.go(url);
        }

        function renderTabs() {
            const tabBar = document.getElementById('tab-bar');
            tabBar.style.display = 'flex';
            tabBar.querySelectorAll('.tab').forEach(t => t.remove());

            tabs.forEach(tab => {
                const tabEl = document.createElement('div');
                tabEl.className = `tab ${tab.id === activeTabId ? 'active' : ''}`;
                tabEl.innerHTML = `
                    <img src="https://pngimg.com/d/baseball_PNG19004.png">
                    <span style="overflow:hidden; white-space:nowrap; flex:1;">WatchBaseball</span>
                    <span class="close-tab" onclick="closeTab('${tab.id}', event)">×</span>
                `;
                tabEl.onclick = () => switchTab(tab.id);
                tabBar.insertBefore(tabEl, tabBar.querySelector('.new-tab-btn'));
            });
        }

        function switchTab(id) {
            activeTabId = id;
            document.querySelectorAll('.proxy-frame').forEach(f => f.classList.remove('active'));
            const activeFrame = document.getElementById(id);
            if (activeFrame) {
                activeFrame.classList.add('active');
                const tab = tabs.find(t => t.id === id);
                document.getElementById('proxy-nav-input').value = tab.url;
            }
            renderTabs();
        }

        function closeTab(id, e) {
            if (e) e.stopPropagation();
            const index = tabs.findIndex(t => t.id === id);
            if (index > -1) {
                document.getElementById(id).remove();
                tabs.splice(index, 1);
                if (tabs.length === 0) exitProxy();
                else if (activeTabId === id) switchTab(tabs[tabs.length - 1].id);
                else renderTabs();
            }
        }

        function search(input, template) {
            try { return new URL(input).toString(); } catch (err) { }
            try {
                const url = new URL(`http://${input}`);
                if (url.hostname.includes(".")) return url.toString();
            } catch (err) { }
            return template.replace("%s", encodeURIComponent(input));
        }

        function openNewTabPrompt() {
            const query = prompt("Search or enter URL:");
            if (query) {
                const url = search(query, "https://www.google.com/search?q=%s");
                createTab(url);
            }
        }

        window.addEventListener('load', () => {
            const form = document.getElementById("sj-form");
            const address = document.getElementById("sj-address");

            form.addEventListener("submit", async (e) => {
                e.preventDefault();
                const query = address.value.trim();
                if (!query) return;

                const url = search(query, "https://www.google.com/search?q=%s");
                document.getElementById('proxy-overlay').style.display = 'flex';
                document.getElementById('main-menu').style.display = 'none';
                document.getElementById('sports-container').style.display = 'none';

                const wispUrl = (location.protocol === "https:" ? "wss" : "ws") + "://" + location.host + "/wisp/";
                await connection.setTransport("/epoxy/index.mjs", [{ wisp: wispUrl }]);
                
                createTab(url);
            });
        });

        window.exitProxy = () => {
            if(confirm("Exit browser mode?")) {
                location.reload();
            }
        }
    </script>
</body>
</html>
