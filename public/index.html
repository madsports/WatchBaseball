<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchBaseball | Secure Proxy</title>

    <script src="/scram/scramjet.all.js"></script>
    <script src="/baremux/index.js"></script>
    <script src="/epoxy/index.js"></script>
    <script src="/register-sw.js"></script>
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Glassmorphism Container */
        .main-ui-container {
            width: 90%;
            max-width: 700px;
            margin: 60px auto 20px auto;
            padding: 40px;
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            transition: transform 0.3s ease;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 0 10px 0;
        }

        p {
            color: var(--text-dim);
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        /* Modern Navbar */
        .nav-links {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 30px;
        }

        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .nav-links a:hover {
            color: white;
            text-shadow: 0 0 8px rgba(255,255,255,0.3);
        }

        .address-bar-display {
            font-family: monospace;
            font-size: 11px;
            color: #6366f1;
            margin-bottom: 15px;
            opacity: 0.8;
        }

        /* Search Form Redesign */
        #sj-form {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px;
            border-radius: 18px;
            border: 1px solid var(--glass-border);
            transition: all 0.3s;
            max-width: 500px;
            margin: 0 auto;
        }

        #sj-form:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        #sj-address {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px 18px;
            font-size: 1rem;
            outline: none;
        }

        button.primary-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button.primary-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        /* News Grid Modernization */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .news-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            overflow: hidden;
            text-decoration: none;
            transition: all 0.3s;
        }

        .news-card:hover {
            background: rgba(255,255,255,0.07);
            transform: translateY(-4px);
        }

        .news-thumb {
            width: 100%; height: 120px; object-fit: cover; opacity: 0.8;
        }

        .news-title {
            padding: 12px; font-size: 0.9rem; color: var(--text-main); font-weight: 500;
        }

        /* Proxy Overlay */
        #proxy-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            display: none;
            flex-direction: column;
        }

        .proxy-bar {
            background: #111;
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 15px;
            border-bottom: 1px solid #222;
        }

        .proxy-bar button {
            background: #ef4444; color: white; border: none; padding: 8px 18px; border-radius: 8px; font-weight: bold; cursor: pointer;
        }

        #proxy-nav-input {
            flex: 1; background: #222; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; outline: none;
        }

        #sj-frame { border: none; width: 100%; height: calc(100% - 60px); }

        /* Logs Styling */
        #logs-window {
            position: fixed; bottom: 20px; right: 20px; width: 300px;
            background: #1e1b4b; border: 1px solid var(--glass-border);
            border-radius: 16px; overflow: hidden; z-index: 10000;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5);
        }

        .logs-header {
            background: var(--primary); padding: 10px 15px; font-size: 0.8rem; font-weight: bold; display: flex; justify-content: space-between; cursor: move;
        }

        #error-msg { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444; border-radius: 12px; padding: 10px; margin-top: 15px; display: none; }
    </style>
</head>

<body>

    <div class="main-ui-container" id="main-menu">
        <div class="address-bar-display">https://watchbaseball.onrender.com/</div>
        
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="https://github.com/madsports" target="_blank">Github</a>
            <a href="/credits.html">Credits</a>
        </div>

        <h1>WatchBaseball</h1>
        <p>Your gateway to unrestricted browsing.</p>

        <form id="sj-form">
            <input id="sj-search-engine" value="https://www.google.com/search?q=%s" type="hidden" />
            <input id="sj-address" type="text" placeholder="Search Google or type URL..." autocomplete="off" />
            <button type="submit" class="primary-btn" id="sj-btn">Go</button>
        </form>
        
        <div id="error-msg"></div>
    </div>

    <div class="main-ui-container" style="margin-top: 0px;">
        <h3 style="text-align: left; font-size: 1rem; color: var(--text-dim); margin-bottom: 20px; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px;">Latest Headlines</h3>
        <div id="learning-news" class="news-grid">
            <p style="grid-column: 1/-1; color: var(--text-dim);">Loading Feed...</p>
        </div>
    </div>

    <div id="proxy-overlay">
        <div class="proxy-bar">
            <button onclick="exitProxy()">Exit</button>
            <form id="proxy-nav-form" style="flex: 1; display: flex;">
                <input id="proxy-nav-input" type="text" placeholder="Navigate..." />
            </form>
        </div>
    </div>

    <div id="logs-window">
        <div class="logs-header" id="logs-header">
            <span>System Logs</span>
            <div class="logs-controls">
                <button onclick="toggleLogs()" style="background:none; border:none; color:white; cursor:pointer;">—</button>
                <button onclick="closeLogs()" style="background:none; border:none; color:white; cursor:pointer;">×</button>
            </div>
        </div>
        <iframe id="update-logs-frame" src="/assets/2.html" style="width:100%; height:200px; border:none; background: #0f172a;"></iframe>
    </div>

    <script>
        "use strict";

        async function loadRSS() {
            try {
                const url = "https://learningnews.com/feed";
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`);
                const data = await res.json();
                const container = document.getElementById("learning-news");
                if (!data.items) return;
                container.innerHTML = "";
                data.items.slice(0, 6).forEach(item => {
                    let imgUrl = item.thumbnail || "/placeholder.jpg";
                    const card = document.createElement("a");
                    card.className = "news-card";
                    card.href = item.link;
                    card.target = "_blank";
                    card.innerHTML = `
                        <img src="${imgUrl}" class="news-thumb" onerror="this.src='/placeholder.jpg'">
                        <div class="news-title">${item.title}</div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) { container.innerHTML = "<p>Feed unavailable.</p>"; }
        }

        function search(input, template) {
            try { return new URL(input).toString(); } catch (err) { }
            try {
                const url = new URL(`http://${input}`);
                if (url.hostname.includes(".")) return url.toString();
            } catch (err) { }
            return template.replace("%s", encodeURIComponent(input));
        }

        async function manualRegisterSW() {
            if ('serviceWorker' in navigator) {
                return navigator.serviceWorker.register('/scram/sw.js', { scope: '/scram/service/' });
            }
        }

        window.addEventListener('load', async () => {
            const form = document.getElementById("sj-form");
            const address = document.getElementById("sj-address");
            const searchEngine = document.getElementById("sj-search-engine");
            const btn = document.getElementById("sj-btn");
            const errorMsg = document.getElementById("error-msg");
            const mainMenu = document.getElementById("main-menu");
            const proxyOverlay = document.getElementById("proxy-overlay");
            const proxyInput = document.getElementById("proxy-nav-input");
            const proxyNavForm = document.getElementById("proxy-nav-form");
            
            loadRSS();

            if (typeof BareMux === 'undefined' || typeof $scramjetLoadController === 'undefined') {
                errorMsg.textContent = "Engine initialization failed.";
                errorMsg.style.display = "block";
                return;
            }

            const { ScramjetController } = $scramjetLoadController();
            const scramjet = new ScramjetController({
                files: { wasm: '/scram/scramjet.wasm.wasm', all: '/scram/scramjet.all.js', sync: '/scram/scramjet.sync.js' },
            });
            scramjet.init();

            const connection = new BareMux.BareMuxConnection("/baremux/worker.js");

            form.addEventListener("submit", async (event) => {
                event.preventDefault();
                const val = address.value.trim();
                if (!val) return;
                btn.disabled = true;
                btn.textContent = "...";

                try {
                    if (typeof registerSW === 'function') await registerSW();
                    else await manualRegisterSW();

                    const url = search(val, searchEngine.value);
                    const wispUrl = (location.protocol === "https:" ? "wss" : "ws") + "://" + location.host + "/wisp/";
                    if ((await connection.getTransport()) !== "/epoxy/index.mjs") {
                        await connection.setTransport("/epoxy/index.mjs", [{ wisp: wispUrl }]);
                    }

                    document.body.style.overflow = "hidden";
                    mainMenu.style.display = "none";
                    document.querySelectorAll('.main-ui-container')[1].style.display = "none";
                    proxyOverlay.style.display = "flex";
                    proxyInput.value = url;

                    const existingFrame = document.getElementById("sj-frame");
                    if (existingFrame) existingFrame.remove();

                    const frame = scramjet.createFrame();
                    frame.frame.id = "sj-frame";
                    proxyOverlay.appendChild(frame.frame);
                    frame.go(url);
                } catch (err) {
                    errorMsg.textContent = "Error: " + err.message;
                    errorMsg.style.display = "block";
                    btn.disabled = false;
                } finally { btn.textContent = "Go"; btn.disabled = false; }
            });

            proxyNavForm.addEventListener('submit', (e) => {
                e.preventDefault();
                address.value = proxyInput.value;
                form.dispatchEvent(new Event('submit'));
            });

            window.exitProxy = function () {
                document.body.style.overflow = "auto";
                proxyOverlay.style.display = "none";
                mainMenu.style.display = "block";
                document.querySelectorAll('.main-ui-container')[1].style.display = "block";
                const f = document.getElementById("sj-frame");
                if (f) f.remove();
            }
        });

        // Logs Drag Logic
        const logsWindow = document.getElementById("logs-window");
        const logsHeader = document.getElementById("logs-header");
        let isDragging = false, xOffset = 0, yOffset = 0;
        logsHeader.onmousedown = (e) => { isDragging = true; };
        document.onmouseup = () => isDragging = false;
        document.onmousemove = (e) => {
            if (isDragging) {
                logsWindow.style.left = (e.clientX - 150) + "px";
                logsWindow.style.top = (e.clientY - 10) + "px";
            }
        };

        window.toggleLogs = () => { 
            const f = document.getElementById('update-logs-frame');
            f.style.height = f.style.height === '0px' ? '200px' : '0px'; 
        };
        window.closeLogs = () => logsWindow.style.display = 'none';
    </script>
</body>
</html>
