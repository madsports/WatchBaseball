<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>My Drive - Google Drive</title>
    <link rel="icon" type="image/x-icon" href="https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png">

    <script src="/scram/scramjet.all.js"></script>
    <script src="/baremux/index.js"></script>
    <script src="/epoxy/index.js"></script>
    <script src="/register-sw.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: #111111;
            --accent: #ffffff;
            --text-main: #ffffff;
            --text-dim: #888888;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0; padding: 0;
            min-height: 100vh;
            display: flex; flex-direction: column;
            overflow-x: hidden;
        }

        /* Top Navigation */
        .top-nav {
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            border-bottom: 1px solid var(--border);
        }

        .nav-links { display: flex; gap: 30px; }
        .nav-links a { 
            color: var(--text-dim); 
            text-decoration: none; 
            font-size: 0.9rem; 
            font-weight: 500; 
            transition: 0.3s;
            letter-spacing: 0.5px;
        }
        .nav-links a:hover { color: var(--accent); }

        /* Main Hero Section */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }

        .hero h1 { 
            font-size: 5rem; 
            margin: 0; 
            font-weight: 800; 
            letter-spacing: -4px; 
            line-height: 0.9;
        }

        .sub-header { 
            font-size: 1.2rem; 
            color: var(--text-dim); 
            margin-top: 20px;
            font-weight: 300;
        }

        .made-by {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-top: 10px;
            letter-spacing: 3px;
        }

        /* Search Bar Redesign - Keeping the part you liked but 10x better */
        #sj-form {
            margin-top: 50px;
            width: 100%;
            max-width: 650px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 10px;
            display: flex;
            gap: 10px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #sj-form:focus-within {
            border-color: #fff;
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(255,255,255,0.05);
        }

        #sj-address {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            padding-left: 20px;
            font-size: 1.1rem;
            outline: none;
            font-family: 'Outfit', sans-serif;
        }

        .primary-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 15px 35px;
            border-radius: 14px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }

        .primary-btn:hover { background: #ccc; }

        /* Sports Cards - Minimalist List */
        .sports-container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto 100px auto;
            padding: 0 20px;
        }

        .section-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 20px;
            display: block;
        }

        .news-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .news-card {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 24px;
            text-decoration: none;
            color: #fff;
            transition: 0.4s;
        }

        .news-card:hover {
            background: var(--card-bg);
            border-color: #444;
            transform: translateY(-5px);
        }

        /* TAB OVERLAY */
        #proxy-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: none; flex-direction: column;
        }

        #tab-bar {
            display: flex; background: #000; padding: 10px 15px 0 15px;
            gap: 8px; border-bottom: 1px solid #111; overflow-x: auto;
        }

        .tab {
            background: #111; color: #555; padding: 12px 20px; border-radius: 12px 12px 0 0;
            cursor: pointer; display: flex; align-items: center; gap: 12px; min-width: 160px;
            border: 1px solid #222; border-bottom: none; font-size: 13px;
            transition: 0.3s;
        }

        .tab.active { background: #222; color: #fff; border-color: #333; }
        .tab img { width: 16px; height: 16px; }

        .new-tab-btn { background: #222; color: #fff; border: none; width: 35px; height: 35px; border-radius: 10px; cursor: pointer; margin-bottom: 5px; }

        .proxy-nav { background: #000; padding: 10px 20px; display: flex; gap: 15px; border-bottom: 1px solid #111; }
        .exit-btn { background: #ff4444; color: white; border: none; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #proxy-nav-input { flex: 1; background: #111; border: 1px solid #222; color: #888; border-radius: 8px; padding: 8px 15px; outline: none; font-family: 'JetBrains Mono'; font-size: 12px; }

        iframe { width: 100%; height: 100%; border: none; position: absolute; opacity: 0; transition: opacity 0.5s ease; pointer-events: none; }
        iframe.active { opacity: 1; pointer-events: auto; }

        @media (max-width: 768px) {
            .hero h1 { font-size: 3rem; }
            .news-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>

    <nav class="top-nav">
        <div style="font-weight: 800; letter-spacing: -1px;">WB.</div>
        <div class="nav-links">
            <a href="/">HOME</a>
            <a href="/credits.html">CREDITS</a>
        </div>
    </nav>

    <div class="hero" id="main-menu">
        <h1>WatchBaseball</h1>
        <p class="sub-header">Premium Access to Sports and Web Search</p>
        <div class="made-by">made by mad</div>

        <form id="sj-form">
            <input id="sj-address" type="text" placeholder="Explore the web..." autocomplete="off" />
            <button type="submit" class="primary-btn">GO</button>
        </form>
    </div>

    <div class="sports-container" id="sports-section">
        <span class="section-label">// LIVE SPORTS FEED</span>
        <div id="learning-news" class="news-grid">
            </div>
    </div>

    <div id="proxy-overlay">
        <div id="tab-bar">
            <button class="new-tab-btn" onclick="openNewTabPrompt()">+</button>
        </div>
        <div class="proxy-nav">
            <button class="exit-btn" onclick="exitProxy()">EXIT</button>
            <input id="proxy-nav-input" type="text" readonly />
        </div>
        <div class="frame-container" id="frame-host" style="flex:1; position:relative;"></div>
    </div>

    <script>
        "use strict";

        let tabs = [];
        let activeTabId = null;
        let globalScramjet = null;

        async function loadSports() {
            try {
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://www.espn.com/espn/rss/mlb/news')}`);
                const data = await res.json();
                const container = document.getElementById("learning-news");
                container.innerHTML = "";
                data.items.slice(0, 4).forEach(item => {
                    const card = document.createElement("a");
                    card.className = "news-card";
                    card.href = item.link;
                    card.target = "_blank";
                    card.innerHTML = `<div style="font-family:'JetBrains Mono'; font-size:10px; color:#555; margin-bottom:10px;">RSS://FEED_UPDATE</div>
                                      <div style="font-weight:500; font-size:1.1rem; line-height:1.2;">${item.title}</div>`;
                    container.appendChild(card);
                });
            } catch (e) { }
        }

        function initScramjet() {
            if (!globalScramjet) {
                const { ScramjetController } = $scramjetLoadController();
                globalScramjet = new ScramjetController({
                    files: { wasm: '/scram/scramjet.wasm.wasm', all: '/scram/scramjet.all.js', sync: '/scram/scramjet.sync.js' },
                });
                globalScramjet.init();
            }
            return globalScramjet;
        }

        async function createTab(url) {
            const scramjet = initScramjet();
            const id = 'tab-' + Date.now();
            const frameObj = scramjet.createFrame();
            const frame = frameObj.frame;
            frame.id = id;
            document.getElementById('frame-host').appendChild(frame);
            
            tabs.push({ id, url, frameObj });
            renderTabs();
            switchTab(id);
            frameObj.go(url);
        }

        function renderTabs() {
            const tabBar = document.getElementById('tab-bar');
            tabBar.style.display = 'flex';
            tabBar.querySelectorAll('.tab').forEach(t => t.remove());

            tabs.forEach(tab => {
                const tabEl = document.createElement('div');
                tabEl.className = `tab ${tab.id === activeTabId ? 'active' : ''}`;
                tabEl.onclick = () => switchTab(tab.id);
                tabEl.innerHTML = `
                    <img src="https://pngimg.com/d/baseball_PNG19004.png">
                    <span>WatchBaseball</span>
                    <span style="margin-left:auto; opacity:0.3;" onclick="closeTab('${tab.id}', event)">×</span>
                `;
                tabBar.insertBefore(tabEl, tabBar.querySelector('.new-tab-btn'));
            });
        }

        function switchTab(id) {
            activeTabId = id;
            document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
            const activeFrame = document.getElementById(id);
            if (activeFrame) {
                activeFrame.classList.add('active');
                document.getElementById('proxy-nav-input').value = tabs.find(t => t.id === id).url;
            }
            renderTabs();
        }

        function closeTab(id, e) {
            e.stopPropagation();
            const index = tabs.findIndex(t => t.id === id);
            if (index > -1) {
                document.getElementById(id).remove();
                tabs.splice(index, 1);
                if (tabs.length === 0) exitProxy();
                else switchTab(tabs[tabs.length - 1].id);
            }
        }

        function search(input) {
            const template = "https://www.google.com/search?q=%s";
            try { return new URL(input).toString(); } catch (err) { }
            try {
                const url = new URL(`http://${input}`);
                if (url.hostname.includes(".")) return url.toString();
            } catch (err) { }
            return template.replace("%s", encodeURIComponent(input));
        }

        document.getElementById("sj-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const url = search(document.getElementById("sj-address").value);
            document.getElementById('proxy-overlay').style.display = 'flex';
            const connection = new BareMux.BareMuxConnection("/baremux/worker.js");
            const wispUrl = (location.protocol === "https:" ? "wss" : "ws") + "://" + location.host + "/wisp/";
            await connection.setTransport("/epoxy/index.mjs", [{ wisp: wispUrl }]);
            createTab(url);
        });

        function openNewTabPrompt() {
            const url = prompt("Explore:");
            if (url) createTab(search(url));
        }

        function exitProxy() { location.reload(); }
        loadSports();
    </script>
</body>
</html>
